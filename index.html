<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible File Explorer</title>
  </head>
  <body>
    <div id="app">
      <header>
        <p>Current location: <span id="current-path">/</span></p>
      </header>

      <main>
        <div id="file-list" role="tree" aria-label="File system navigation">
          <div role="treeitem" aria-selected="false" aria-level="1" aria-posinset="1" aria-setsize="1">Loading files...</div>
        </div>
      </main>

      <div id="status-announcer" role="status" aria-live="polite" aria-atomic="true"></div>
      <div id="error-announcer" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
